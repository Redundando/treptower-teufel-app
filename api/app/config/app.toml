[jwt]
algorithm = "HS256"
# 30 days (match web cookie Max-Age in web/src/lib/authTokenCookie.ts)
access_token_seconds = 2592000
token_type = "Bearer"
secret_key = ""

[database]
# Defaults are optional; environment variables override.
# Keep this empty for local dev if you only use DATABASE_URL from `.env`.
url = ""

