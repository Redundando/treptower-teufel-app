# Manual: Actions → Deploy staging → Run workflow
# Requires repo secrets: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY
name: Deploy staging

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — pull main and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            if [ -d /srv/tttc/staging/repo ]; then
              cd /srv/tttc/staging/repo
            elif [ -d /srv/tttc/app/repo ]; then
              cd /srv/tttc/app/repo
            else
              echo "No staging repo at /srv/tttc/staging/repo or /srv/tttc/app/repo"
              exit 1
            fi
            bash scripts/deploy-remote-staging.sh
