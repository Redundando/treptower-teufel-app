# Push semver tag v*.*.* → deploy prod, OR manual workflow with git ref (e.g. main).
# Requires: prod tree at /srv/tttc/prod, systemd tttc-*-prod, secrets SSH_*
name: Deploy production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Branch or tag to deploy (e.g. main, v0.1.2)'
        required: true
        default: 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH — checkout ref and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              export GIT_REF="${{ github.event.inputs.git_ref }}"
            else
              export GIT_REF="${{ github.ref_name }}"
            fi
            cd /srv/tttc/prod/repo
            bash scripts/deploy-remote-prod.sh
